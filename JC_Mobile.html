<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Medique · Panel Móvil</title>
<link rel="preconnect" href="https://unpkg.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="dns-prefetch" href="https://www.gstatic.com">
<link rel="dns-prefetch" href="https://firestore.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500;1,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  /* Bloquea el desplazamiento/rebote de la PÁGINA (no del contenido interno de la app): sin esto,
     al arrastrar hacia arriba/abajo en iOS el documento entero se movía y dejaba ver el fondo negro
     del body detrás. El body queda fijo (position:fixed + inset:0, la técnica clásica más robusta
     en iOS Safari) y overscroll-behavior como refuerzo en navegadores modernos. El scroll de listas,
     agenda, etc. sigue funcionando porque esos contenedores tienen su propio overflow-y:auto interno. */
  html{height:100%;overflow:hidden}
  body{position:fixed;inset:0;width:100%;height:100%;overflow:hidden;overscroll-behavior:none;-webkit-text-size-adjust:100%;touch-action:manipulation}
  body{font-family:'Jost',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#070707;-webkit-font-smoothing:antialiased}
  #root{height:100%;overflow:hidden}
  button{font-family:inherit}input,select,textarea{font-family:inherit}
  select{-webkit-appearance:none}
  @keyframes jcFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes jcPop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
  @keyframes jcDrawerIn{from{transform:translateX(-100%)}to{transform:none}}
  .jc-scroll::-webkit-scrollbar{width:0;height:0}
</style>
<script>
  // Bloquea el zoom (pedido del usuario: si se hace zoom, la pantalla se buguea). El meta viewport
  // (maximum-scale=1, user-scalable=no) no basta en iOS Safari, que ignora user-scalable en varias
  // versiones — se refuerza cancelando el gesto nativo de pellizco y cualquier touchmove multitáctil.
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener('gestureend', function(e){ e.preventDefault(); }, { passive:false });
  document.addEventListener('touchmove', function(e){ if (e.touches && e.touches.length > 1) e.preventDefault(); }, { passive:false });
</script>
</head>
<body>
<div id="root"></div>

<!-- React (producción) — sin Babel: JSX pre-compilado en dist/ -->
