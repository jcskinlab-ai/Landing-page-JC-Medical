<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{font-family:'Jost',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#070707;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  #root{height:100%}
  .jc-stage{width:100%;min-height:100%;display:flex;align-items:center;justify-content:center}
  .jc-app-frame{position:relative;display:flex;flex-direction:column;overflow:hidden;width:100%;height:100dvh;}
  @media(min-width:600px){
    .jc-stage{padding:28px 16px}
    .jc-app-frame{width:430px;height:min(900px,94vh);border-radius:30px}
  }
  /* adapt: panel lateral informativo en desktop (≥1024px) */
  .jc-desktop-side{display:none}
  @media(min-width:1024px){
    .jc-stage{flex-direction:row;gap:52px;align-items:center;justify-content:center}
    .jc-desktop-side{display:flex;flex-direction:column;justify-content:center;width:260px;flex-shrink:0;animation:jcFade .9s cubic-bezier(.22,1,.36,1) both}
  }
  .jc-scroll{-webkit-overflow-scrolling:touch;scrollbar-width:thin}
  .jc-scroll::-webkit-scrollbar{width:0px}
  button{font-family:inherit}
  input{font-family:inherit}
  /* Endurecimiento táctil móvil (skill mobile-design): sin flash gris al tocar,
     sin retardo de 300 ms ni doble-tap-zoom, sin selección/callout en los controles. */
  *{-webkit-tap-highlight-color:transparent}
  button,a,[role=button],label,select{touch-action:manipulation}
  button,a[role=button]{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  /* El scroll interno no arrastra la página detrás del marco de la app (sin rebote en cadena) */
  .jc-scroll{overscroll-behavior:contain}
  /* Foco visible para navegación por teclado (no aparece al hacer clic con el mouse) */
  :focus-visible{outline:2px solid #54707F;outline-offset:2px;border-radius:4px}
  button:focus:not(:focus-visible),a:focus:not(:focus-visible){outline:none}
  /* Micro-press (animación del prompt): los botones bajan un poco al pulsar */
  button:active{transform:scale(.97)}
  @media (prefers-reduced-motion: reduce){button:active{transform:none}}
  h1,h2,h3{text-wrap:balance}
  @keyframes jcFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes jcSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes jcSlideFromRight{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:none}}
  @keyframes jcSlideFromLeft{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
  @keyframes jcPop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes jcBounce{0%,100%{transform:translateY(0);opacity:.7}50%{transform:translateY(6px);opacity:1}}
  @keyframes jcAttn{0%,100%{box-shadow:0 0 0 0 rgba(196,169,106,0)}50%{box-shadow:0 0 0 4px rgba(196,169,106,.28)}}
  /* delight: pulso suave del FAB de agendar */
  @keyframes jcFabPulse{0%,100%{box-shadow:0 6px 18px rgba(0,0,0,.22),0 0 0 0 rgba(31,138,91,0)}55%{box-shadow:0 6px 18px rgba(0,0,0,.22),0 0 0 6px rgba(31,138,91,.12)}}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important}}
</style>
