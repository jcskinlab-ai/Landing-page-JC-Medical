<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Jost', -apple-system, sans-serif;
    background: #F5F2EC;
    color: #1A1A14;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 40px 24px;
    overflow: hidden;
  }

  /* Fondo sutil */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(84,112,127,.07) 0%, transparent 70%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(84,112,127,.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    max-width: 480px;
    animation: fadeUp .9s cubic-bezier(.22,1,.36,1) both;
  }

  .mark {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: #54707F;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    box-shadow: 0 8px 28px -8px rgba(84,112,127,.45);
  }

  .brand {
    font-family: 'Marcellus', serif;
    font-size: clamp(28px, 8vw, 38px);
    font-weight: 400;
    letter-spacing: -.01em;
    color: #1A1A14;
    line-height: 1;
    margin-bottom: 6px;
  }
  .brand em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    color: #54707F;
  }

  .sub {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: #8A8674;
    margin-bottom: 48px;
  }

  .divider {
    width: 36px;
    height: 1px;
    background: rgba(20,20,15,.15);
    margin-bottom: 32px;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 6vw, 30px);
    font-weight: 300;
    line-height: 1.35;
    color: #1A1A14;
    margin-bottom: 16px;
  }

  .body {
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    line-height: 1.7;
    color: #5C5A50;
    max-width: 360px;
    margin-bottom: 48px;
  }

  .cta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    margin-bottom: 56px;
  }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #54707F;
    color: #F5F2EC;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 14px 24px;
    border-radius: 999px;
    transition: opacity .25s;
  }
  .btn-primary:hover { opacity: .85; }

  .btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    color: #54707F;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .14em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 14px 24px;
    border-radius: 999px;
    border: 1px solid rgba(84,112,127,.35);
    transition: background .25s, border-color .25s;
  }
  .btn-ghost:hover { background: rgba(84,112,127,.07); border-color: rgba(84,112,127,.6); }

  .footer {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: #8A8674;
    letter-spacing: .05em;
  }
  .footer a { color: inherit; text-decoration: none; border-bottom: 1px solid currentColor; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }
</style>
</head>

</html>
