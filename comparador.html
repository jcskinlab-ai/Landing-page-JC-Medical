<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JC Medical · Comparador (actual vs. propuesto)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Jost:wght@300;400;500;600&family=Marcellus&family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Serif+Display&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ui-bg:#0c0d10;--ui-panel:#16181d;--ui-panel2:#1d2026;--ui-line:rgba(255,255,255,.10);--ui-text:#e8eaed;--ui-mute:rgba(232,234,237,.6);--ui-faint:rgba(232,234,237,.38);--ui-accent:#c4a96a;--ui-sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif}
html,body{min-height:100%}
body{font-family:var(--ui-sans);background:var(--ui-bg);color:var(--ui-text);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.16);border-radius:10px}

.chead{position:sticky;top:0;z-index:20;background:rgba(12,13,16,.9);backdrop-filter:blur(14px);border-bottom:1px solid var(--ui-line);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap}
.ctitle{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;line-height:1}
.ctitle span{display:block;font-family:var(--ui-sans);font-size:11.5px;font-weight:400;color:var(--ui-mute);letter-spacing:.03em;margin-top:5px}
.ctoggle{display:flex;gap:0;background:var(--ui-panel);border:1px solid var(--ui-line);border-radius:11px;padding:4px}
.ctoggle button{padding:9px 18px;border-radius:8px;font-size:12.5px;font-weight:600;color:var(--ui-mute);letter-spacing:.02em}
.ctoggle button.on{background:var(--ui-accent);color:#0c0d10}
.cstyles{display:flex;gap:8px;overflow-x:auto;padding:13px 26px;border-bottom:1px solid var(--ui-line);background:var(--ui-panel)}
.cstyles::-webkit-scrollbar{height:0}
.cchip{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:8px 12px 8px 8px;border-radius:11px;border:1px solid transparent;background:var(--ui-bg);transition:.16s}
.cchip:hover{background:var(--ui-panel2)}
.cchip.on{border-color:var(--ui-accent);background:var(--ui-panel2)}
.cchip .sw{width:34px;height:26px;border-radius:7px;position:relative;overflow:hidden;flex:0 0 auto}
.cchip .sw i{position:absolute;bottom:4px;right:4px;width:8px;height:8px;border-radius:50%}
.cchip .tx{text-align:left;line-height:1.1}
.cchip .tx b{display:block;font-size:12px;font-weight:600;white-space:nowrap}
.cchip.on .tx b{color:var(--ui-accent)}
.cchip .tx span{font-size:9.5px;color:var(--ui-faint);letter-spacing:.12em}

.ccols{display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:20px 26px 60px;align-items:start}
.ccol{min-width:0}
.clabel{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:12px;color:var(--ui-mute)}
.clabel b{font-size:10.5px;font-weight:700;letter-spacing:.16em;padding:5px 10px;border-radius:999px}
.clabel.now b{background:rgba(232,234,237,.12);color:var(--ui-text)}
.clabel.prop b{background:var(--ui-accent);color:#0c0d10}
.clabel .nm{font-weight:600;color:var(--ui-text)}
.cframe{border-radius:18px;overflow:hidden;border:1px solid var(--ui-line);background:#070707}
.cframe iframe{width:100%;border:none;display:block;background:#070707}
.note{font-size:11px;color:var(--ui-faint);margin-top:8px;line-height:1.5}
.note b{color:var(--ui-mute)}
@media(max-width:900px){.ccols{grid-template-columns:1fr}}

/* ===== estilos de los mockups (idénticos al visor) ===== */
.stage{--radius:16px;--btn-radius:999px;--label-tf:none;--disp-sp:0em;--disp-w:600;padding:24px;background:var(--canvas,#101)}
.appwrap{display:flex;justify-content:center}
.phone{width:392px;height:752px;border-radius:42px;background:#111;padding:11px;box-shadow:0 30px 70px -30px rgba(0,0,0,.7),0 0 0 2px rgba(255,255,255,.04);flex:0 0 auto}
.screen{width:100%;height:100%;border-radius:32px;overflow:hidden;position:relative;background:var(--bg);color:var(--text);font-family:var(--body)}
.app-scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden}.app-scroll::-webkit-scrollbar{width:0}
.app-top{position:absolute;top:0;left:0;right:0;z-index:8;display:flex;align-items:center;justify-content:space-between;padding:13px 15px;background:linear-gradient(180deg,rgba(0,0,0,.42),rgba(0,0,0,0))}
.icbtn{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.4);color:#fff}
.acct{display:inline-flex;align-items:center;gap:7px;font-size:9.5px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.32);border:1px solid rgba(255,255,255,.36);border-radius:999px;padding:8px 13px}
.hero{position:relative;height:312px;display:flex;flex-direction:column;justify-content:flex-end;padding:22px 20px 24px;color:#fff;background:var(--hero-bg);overflow:hidden}
.hero::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.12) 45%,rgba(0,0,0,.62))}
.hero>*{position:relative;z-index:2}
.hmono{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-family:var(--disp);font-size:19px;font-weight:600;border:1.5px solid rgba(255,255,255,.7);margin-bottom:auto;color:#fff}
.hk{font-size:10px;letter-spacing:.24em;text-transform:uppercase;opacity:.92;margin-bottom:9px;font-weight:500}
.ht{font-family:var(--disp);font-weight:var(--disp-w);letter-spacing:var(--disp-sp);font-size:32px;line-height:1.04;margin-bottom:9px}
.hs{font-size:12.5px;line-height:1.55;opacity:.9;max-width:280px;margin-bottom:15px}
.cta{align-self:flex-start;background:var(--accent);color:var(--onAccent);font-family:var(--body);font-size:12px;font-weight:600;letter-spacing:.04em;padding:12px 20px;border-radius:var(--btn-radius);text-transform:var(--label-tf)}
.sechead{display:flex;align-items:baseline;justify-content:space-between;padding:22px 18px 12px}
.sechead h2{font-family:var(--disp);font-weight:var(--disp-w);letter-spacing:var(--disp-sp);font-size:21px}
.sechead a{font-size:11px;color:var(--accent);font-weight:600;text-transform:var(--label-tf)}
.feat{display:flex;flex-direction:column;gap:13px;padding:0 18px}
.fcard{background:var(--card-bg);border:var(--card-border);border-radius:var(--radius);box-shadow:var(--card-shadow);overflow:hidden;display:flex;flex-direction:column}
.fcard .fimg{height:104px;background:var(--accent-grad);display:flex;align-items:flex-start;padding:11px}
.fchip{font-size:9.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:rgba(255,255,255,.9);color:#1a1a14;padding:5px 9px;border-radius:999px}
.fcard .fbody{padding:13px 14px 14px}
.fttl{font-family:var(--disp);font-weight:var(--disp-w);font-size:18px;line-height:1.1}
.fsub{font-size:11px;color:var(--mute);margin-top:3px}
.fbtm{display:flex;align-items:center;justify-content:space-between;margin-top:11px}
.fprice{font-size:12.5px;font-weight:600;color:var(--text)}
.fgo{font-size:10.5px;font-weight:600;color:var(--accent);display:inline-flex;align-items:center;gap:4px;text-transform:var(--label-tf)}
.bastrip{margin:18px 18px 0;border-radius:var(--radius);background:var(--card-bg);border:var(--card-border);box-shadow:var(--card-shadow);padding:14px}
.bastrip h3{font-family:var(--disp);font-weight:var(--disp-w);font-size:16px;margin-bottom:3px}
.bastrip p{font-size:11px;color:var(--mute)}
.bath{display:flex;gap:8px;margin-top:11px}.bath div{flex:1;height:58px;border-radius:calc(var(--radius) - 6px);background:var(--accent-grad);opacity:.9}
.app-nav{position:absolute;left:0;right:0;bottom:0;z-index:20;padding:0 12px 11px;pointer-events:none}
.app-nav .bar{pointer-events:auto;display:flex;align-items:center;justify-content:space-around;gap:2px;background:var(--navfloat);backdrop-filter:blur(22px) saturate(1.3);border:1px solid var(--line);border-radius:28px;padding:7px 7px;box-shadow:0 12px 30px -12px rgba(0,0,0,.5)}
.app-nav button{flex:1;display:flex;align-items:center;justify-content:center;padding:9px 0;border-radius:18px}
.app-nav button.on{background:var(--navactive)}
.fab{position:absolute;right:16px;bottom:84px;z-index:30;width:50px;height:50px;border-radius:50%;background:rgba(31,138,91,.92);display:grid;place-items:center;box-shadow:0 8px 20px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.25)}

.admin{width:100%;height:680px;border-radius:14px;overflow:hidden;display:flex;background:var(--bg);color:var(--text);font-family:var(--body);box-shadow:0 30px 70px -34px rgba(0,0,0,.6),0 0 0 1px var(--line)}
.side{width:198px;flex:0 0 198px;background:var(--side-bg);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:15px 11px}
.side-logo{display:flex;align-items:center;gap:9px;padding:6px 7px 15px;border-bottom:1px solid var(--line);margin-bottom:11px}
.side-logo .mono{width:31px;height:31px;border-radius:9px;background:var(--accent);color:var(--onAccent);display:grid;place-items:center;font-family:var(--disp);font-weight:600;font-size:13px}
.side-logo b{font-family:var(--disp);font-weight:var(--disp-w);font-size:14px;letter-spacing:.04em;line-height:1}
.side-logo span{display:block;font-size:8.5px;color:var(--mute);letter-spacing:.13em;text-transform:uppercase;margin-top:2px}
.side-nav{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1}.side-nav::-webkit-scrollbar{width:0}
.snav{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--snav-radius,9px);font-size:12px;font-weight:500;color:var(--mute)}
.snav svg{width:16px;height:16px;flex:0 0 auto;opacity:.8}
.snav.on{background:var(--side-active);color:var(--accent);font-weight:600}.snav.on svg{opacity:1}
.side-user{margin-top:9px;padding:9px;border-top:1px solid var(--line);display:flex;align-items:center;gap:8px}
.side-user .av{width:29px;height:29px;border-radius:50%;background:var(--accent-grad);display:grid;place-items:center;font-size:11px;font-weight:600;color:#fff}
.side-user b{font-size:11.5px;font-weight:600;display:block}.side-user span{font-size:9.5px;color:var(--mute)}
.amain{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.atop{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line);background:var(--top-bg)}
.atop h1{font-family:var(--disp);font-weight:var(--disp-w);font-size:22px;line-height:1}
.atop .dt{font-size:10.5px;color:var(--mute);margin-top:3px}
.atop-r{display:flex;align-items:center;gap:8px}
.asearch{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--line);border-radius:var(--btn-radius);padding:7px 12px;font-size:11px;color:var(--mute);width:160px}
.iconchip{width:33px;height:33px;border-radius:var(--btn-radius);background:var(--surface2);border:1px solid var(--line);display:grid;place-items:center;color:var(--mute);position:relative}
.iconchip i{position:absolute;top:7px;right:8px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.abody{flex:1;overflow-y:auto;padding:16px 20px 24px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:11px}
.kpi{background:var(--card-bg);border:var(--card-border);box-shadow:var(--card-shadow);border-radius:var(--radius);padding:13px 14px}
.kpi .kl{font-size:10px;color:var(--mute);text-transform:var(--label-tf);display:flex;align-items:center;gap:6px}
.kpi .kl .kic{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;background:var(--accent-soft);color:var(--accent)}
.kpi .kv{font-family:var(--num-font,var(--disp));font-weight:700;font-size:24px;margin-top:9px}
.kpi .kd{font-size:10px;margin-top:5px;display:inline-flex;align-items:center;gap:4px}
.kpi .kd.up{color:#1f9d5a}.kpi .kd.dn{color:#cc4b4b}
.agrid{display:grid;grid-template-columns:1.5fr 1fr;gap:11px;margin-top:11px}
.acard{background:var(--card-bg);border:var(--card-border);box-shadow:var(--card-shadow);border-radius:var(--radius);padding:14px 15px;min-width:0}
.acard .ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.acard .ch h3{font-family:var(--disp);font-weight:var(--disp-w);font-size:15px}
.acard .ch a{font-size:10px;color:var(--accent);font-weight:600;text-transform:var(--label-tf)}
.appt{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}.appt:last-child{border-bottom:none}
.appt .tm{font-family:var(--num-font,var(--body));font-size:12px;font-weight:600;width:40px}
.appt .pav{width:28px;height:28px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:10.5px;font-weight:600;flex:0 0 auto}
.appt .pn{flex:1;min-width:0}.appt .pn b{font-size:12px;font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.appt .pn span{font-size:10.5px;color:var(--mute)}
.badge{font-size:9px;font-weight:600;padding:4px 8px;border-radius:999px;text-transform:var(--label-tf);white-space:nowrap}
.badge.ok{background:rgba(31,157,90,.14);color:#1f9d5a}.badge.pend{background:rgba(214,158,46,.16);color:#bd861f}
.bars{display:flex;align-items:flex-end;gap:7px;height:108px;margin-top:6px}
.bars .bcol{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:6px}
.bars .bk{width:100%;border-radius:6px 6px 0 0;background:var(--accent-grad);min-height:6px}
.bars .bx{font-size:9px;color:var(--faint)}
.cajatot{font-family:var(--num-font,var(--disp));font-weight:700;font-size:23px;margin-bottom:2px}
.cajasub{font-size:10.5px;color:var(--mute);margin-bottom:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:11px}
.plist{display:flex;flex-direction:column;gap:8px}
.prow{display:flex;align-items:center;gap:10px}.prow .pav{width:30px;height:30px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-size:10.5px;font-weight:600}
.prow .meta{flex:1;min-width:0}.prow .meta b{font-size:11.5px;font-weight:600;display:block}.prow .meta span{font-size:10px;color:var(--mute)}
.prow .amt{font-size:11px;font-weight:600}
.poplist{display:flex;flex-direction:column;gap:10px}
.poprow .pt{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}.poprow .pt b{font-weight:600}.poprow .pt span{color:var(--mute)}
.track{height:6px;border-radius:999px;background:var(--surface2);overflow:hidden}.track i{display:block;height:100%;border-radius:999px;background:var(--accent-grad)}
.stage[data-theme="aurora"] .fcard,.stage[data-theme="aurora"] .acard,.stage[data-theme="aurora"] .kpi,.stage[data-theme="aurora"] .bastrip{backdrop-filter:blur(18px) saturate(1.2)}
.stage[data-theme="aurora"] .side,.stage[data-theme="aurora"] .atop{backdrop-filter:blur(16px)}
.stage[data-theme="swiss"] .ht,.stage[data-theme="swiss"] .atop h1,.stage[data-theme="swiss"] .fttl,.stage[data-theme="swiss"] .acard .ch h3,.stage[data-theme="swiss"] .sechead h2{text-transform:uppercase;letter-spacing:-.01em}
.stage[data-theme="deco"] .fcard,.stage[data-theme="deco"] .acard,.stage[data-theme="deco"] .kpi,.stage[data-theme="deco"] .bastrip{box-shadow:inset 0 0 0 1px var(--accent),inset 0 0 0 4px var(--bg),inset 0 0 0 5px rgba(201,162,77,.4)}
.stage[data-theme="deco"] .hmono{border-color:var(--accent);color:var(--accent)}
.stage[data-theme="bento"] .feat{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.stage[data-theme="bento"] .feat .fcard:first-child{grid-column:1/-1}
.stage[data-theme="bento"] .feat .fcard:first-child .fimg{height:120px}
</style>
</head>
<body>
<header class="chead">
  <div class="ctitle">Comparador<span>Tu versión actual&nbsp;&nbsp;vs.&nbsp;&nbsp;estilo propuesto</span></div>
  <div class="ctoggle"><button data-view="app" class="on" id="vApp">App usuaria</button><button data-view="admin" id="vAdmin">Panel admin</button></div>
</header>
<div class="cstyles" id="cstyles"></div>
<div class="ccols">
  <section class="ccol">
    <div class="clabel now"><b>ACTUAL</b> <span class="nm">Tu versión original</span></div>
    <div class="cframe" id="origMount"></div>
    <div class="note" id="origNote"></div>
  </section>
  <section class="ccol">
    <div class="clabel prop"><b>PROPUESTO</b> <span class="nm" id="propName"></span></div>
    <div class="cframe"><div class="stage" id="propStage"><div id="propMount"></div></div></div>
    <div class="note">Maqueta con contenido real · las fotos van como bloques de color (es prueba de dirección visual).</div>
  </section>
</div>

<script>
