<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Abriendo ubicación…</title>
<style>
  :root { color-scheme: light dark; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#0f1a17; color:#e8f0ec; display:flex; min-height:100vh; align-items:center; justify-content:center; text-align:center; padding:24px; box-sizing:border-box; }
  .box { max-width:420px; }
  .pin { font-size:40px; margin-bottom:10px; }
  h1 { font-size:19px; font-weight:600; margin:0 0 8px; }
  p { font-size:14px; color:#9fb3ab; line-height:1.5; margin:0 0 22px; }
  a.btn { display:inline-block; background:#1F8A5B; color:#fff; text-decoration:none; padding:13px 24px; border-radius:11px; font-size:15px; font-weight:600; }
  .addr { font-size:12.5px; color:#c7d6cf; margin-top:16px; word-break:break-word; }
</style>
</head>
<body>
  <div class="box">
    <div class="pin">📍</div>
    <h1>Abriendo la ubicación…</h1>
    <p>Te estamos llevando a la app de mapas de tu teléfono.</p>
    <a class="btn" id="go" href="#">Abrir mapa</a>
    <div class="addr" id="addr"></div>
  </div>
  <script>
    (function () {
      var qs = new URLSearchParams(location.search);
      var to = qs.get("to") || qs.get("q") || qs.get("query") || "";
      var enc = encodeURIComponent(to);
      var ua = navigator.userAgent || navigator.vendor || "";
      var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      // iPhone/iPad → Apple Maps (app nativa). Android/PC → Google Maps (abre la app en Android).
      var target = isIOS
        ? ("https://maps.apple.com/?q=" + enc)
        : ("https://www.google.com/maps/search/?api=1&query=" + enc);
      var go = document.getElementById("go");
      go.href = target;
      document.getElementById("addr").textContent = to;
      if (to) { try { location.replace(target); } catch (e) { location.href = target; } }
    })();
  </script>
</body>
</html>
