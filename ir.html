<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Abriendo ubicación…</title>
<style>
  :root { color-scheme: light dark; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:#0f1a17; color:#e8f0ec; display:flex; min-height:100vh; align-items:center; justify-content:center; text-align:center; padding:24px; box-sizing:border-box; }
  .box { max-width:420px; }
  .pin { font-size:40px; margin-bottom:10px; }
  h1 { font-size:19px; font-weight:600; margin:0 0 8px; }
  p { font-size:14px; color:#9fb3ab; line-height:1.5; margin:0 0 22px; }
  a.btn { display:inline-block; background:#1F8A5B; color:#fff; text-decoration:none; padding:13px 24px; border-radius:11px; font-size:15px; font-weight:600; }
  .addr { font-size:12.5px; color:#c7d6cf; margin-top:16px; word-break:break-word; }
</style>
</head>
<body>
  <div class="box">
    <div class="pin">📍</div>
    <h1>Abriendo la ubicación…</h1>
    <p>Te estamos llevando a la app de mapas de tu teléfono.</p>
    <a class="btn" id="go" href="#">Abrir mapa</a>
    <div class="addr" id="addr"></div>
  </div>
  <script>
    (function () {
      var qs = new URLSearchParams(location.search);
      var clinicId = qs.get("c") || "";
      var to = qs.get("to") || qs.get("q") || qs.get("query") || "";

      function go(addr) {
        var enc = encodeURIComponent(addr);
        var ua = navigator.userAgent || navigator.vendor || "";
        var isIOS = /iPad|iPhone|iPod/.test(ua) || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
        // iPhone/iPad → Apple Maps (app nativa). Android/PC → Google Maps (abre la app en Android).
        var target = isIOS
          ? ("https://maps.apple.com/?q=" + enc)
          : ("https://www.google.com/maps/search/?api=1&query=" + enc);
        var btn = document.getElementById("go");
        btn.href = target;
        document.getElementById("addr").textContent = addr;
        if (addr) { try { location.replace(target); } catch (e) { location.href = target; } }
      }

      // Link corto (nuevo, pedido): ?c=<clinicId> — resuelve la dirección desde el perfil PÚBLICO
      // de la clínica en Firestore (el mismo doc que ya usa la reserva pública, sin login). Mucho
      // más corto en WhatsApp que ?to=<dirección completa codificada>.
      if (clinicId) {
        var projectId = "medique-8dbf6", apiKey = "AIzaSyCIG19u0_T6rldljMq_St-WJ-XX8JkAsM4";
        var url = "https://firestore.googleapis.com/v1/projects/" + projectId + "/databases/(default)/documents/tenants/"
          + encodeURIComponent(clinicId) + "/public/profile?key=" + apiKey;
        fetch(url).then(function (r) { return r.json(); }).then(function (doc) {
          var addr = (doc && doc.fields && doc.fields.addr && doc.fields.addr.stringValue) || to;
          go(addr);
        }).catch(function () { go(to); }); // si falla la consulta, cae al ?to= si vino como respaldo
        return;
      }

      // Link antiguo (compatibilidad con mensajes ya enviados): ?to=/?q=/?query= con la dirección.
      go(to);
    })();
  </script>
</body>
</html>
