<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vial Sort — Glow Clinic</title>
<link rel="stylesheet" href="../../shared/theme.css?v=16">
<style>
  .game-wrap{display:flex;flex-direction:column;gap:14px;align-items:center}
  .hud{display:flex;gap:10px;align-items:center;justify-content:center;flex-wrap:wrap}
  .stat{background:var(--white);border:1px solid var(--light);border-radius:12px;padding:8px 14px;text-align:center;min-width:80px}
  .stat small{color:#7a869a;font-size:10px;text-transform:uppercase;letter-spacing:.05em;display:block}
  .stat b{font-size:18px;color:var(--blue)}
  #rack{display:flex;flex-wrap:wrap;gap:14px 18px;justify-content:center;align-items:flex-end;padding:10px;max-width:560px}
  .tube{width:46px;height:172px;border:3px solid #b9c4d0;border-top:none;border-radius:6px 6px 22px 22px;background:rgba(255,255,255,.55);display:flex;flex-direction:column-reverse;padding:5px;gap:4px;cursor:pointer;transition:transform .14s;position:relative}
  .tube:hover{border-color:var(--gold)}
  .tube.sel{transform:translateY(-16px);border-color:var(--gold);box-shadow:0 6px 18px rgba(196,169,106,.4)}
  .tube.done::after{content:'✓';position:absolute;top:-22px;left:50%;transform:translateX(-50%);color:var(--green);font-weight:800;font-size:14px}
  .seg{height:36px;border-radius:5px;box-shadow:inset 0 -3px 6px rgba(0,0,0,.12)}
  .controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  #muteBtn{cursor:pointer;border:1px solid var(--light);background:var(--white);border-radius:12px;padding:9px 12px;font-size:16px}
  .hint{font-size:12px;color:#7a869a;text-align:center;max-width:420px}
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <span class="logo">◆</span>
    <span class="brand"><strong>Glow Clinic</strong><small>by JC Medical · Vial Sort</small></span>
    <span class="spacer"></span>
    <button id="muteBtn" title="Silenciar">🔊</button>
    <a class="back-btn" href="../../index.html">← Menú</a>
  </header>

  <main class="game-wrap">
    <section class="hud">
      <div class="stat"><small>Nivel</small><b id="level">1</b></div>
      <div class="stat"><small>Movimientos</small><b id="moves">0</b></div>
      <div class="stat"><small>Mejor nivel</small><b id="best">1</b></div>
    </section>
    <div id="rack"></div>
    <p class="hint">Toca un vial y luego otro para verter el sérum de arriba. Solo cae sobre el mismo color o un vial vacío. Deja cada vial de un solo color.</p>
    <div class="controls">
      <button id="undoBtn" class="btn btn-ghost">↶ Deshacer</button>
      <button id="restartBtn" class="btn btn-ghost">↺ Reiniciar nivel</button>
    </div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h1 id="ovTitle">Vial Sort</h1>
    <p id="ovText"></p>
    <button id="ovBtn" class="btn btn-blue" style="margin-top:8px">Jugar</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="../../shared/sound.js?v=16"></script>
<script src="game.js"></script>
</body>
</html>
