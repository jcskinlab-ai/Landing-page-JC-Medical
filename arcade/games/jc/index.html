<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>JC Medical · Juegos</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F2EC;--surface:#fff;--ink:#1A1A14;--mute:#5C5A50;--line:rgba(20,20,15,.12);--accent:#54707F;--silver:#8A929B;--good:#4E8A72;--bad:#c0563f;--warn:#caa86a;--vio:#9C8AB5}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden}
html{background:#DCD7CC}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100dvh;max-width:440px;margin:0 auto;box-shadow:0 24px 70px -28px rgba(0,0,0,.55)}
.top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
.top .nm{font-family:'Marcellus';font-size:16px}.top .nm span{color:var(--accent)}
.top button{font-family:'Jost';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);background:none;border:none;cursor:pointer;padding:6px}
.hud{display:flex;gap:12px;align-items:center}.hud .s{font-size:11px;color:var(--mute)}.hud .s b{font-family:'Marcellus';font-size:17px;color:var(--ink);display:block;line-height:1}
.stage{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column}
.menu{position:absolute;inset:0;overflow-y:auto;padding:18px 16px 24px}
.menu h1{font-family:'Marcellus';font-weight:400;font-size:26px}.menu h1 em{font-style:italic;color:var(--accent)}
.menu p{color:var(--mute);font-size:12.5px;font-weight:300;margin-top:5px;line-height:1.5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.card{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;cursor:pointer;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;gap:4px}
.card:active{transform:scale(.97)}.card .ic{font-size:24px}.card .t{font-family:'Marcellus';font-size:15px;line-height:1.1}.card .d{font-size:11px;color:var(--mute);font-weight:300;line-height:1.4}.card .rec{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-top:2px}
.ov{position:absolute;inset:0;background:rgba(245,242,236,.97);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:6}
.ov h2{font-family:'Marcellus';font-size:26px;font-weight:400;line-height:1.1}.ov p{color:var(--mute);font-size:13px;font-weight:300;margin-top:10px;line-height:1.6;max-width:300px}
.ov .big{font-family:'Marcellus';font-size:48px;color:var(--accent);line-height:1;margin:8px 0}.ov .ic{font-size:36px;margin-bottom:6px}
.btn{margin-top:16px;font-family:'Jost';font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:var(--ink);color:var(--bg);border:none;border-radius:999px;padding:13px 26px;cursor:pointer}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);margin-top:8px}
.hidden{display:none!important}
#play{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden}
.q{font-family:'Marcellus';font-size:19px;line-height:1.25;color:var(--ink)}
.opt{width:100%;text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:13px 15px;font-family:'Jost';font-size:14px;cursor:pointer;color:var(--ink);transition:.15s;margin-top:9px}
.opt:active{transform:scale(.98)}.opt.ok{background:#dcefe4;border-color:var(--good);color:var(--good)}.opt.no{background:#f3dcd5;border-color:var(--bad);color:var(--bad)}
.bar{height:4px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:4px}
.bar i{display:block;height:100%;background:var(--accent);transition:width .25s linear}
.lives{display:inline-flex;gap:4px;font-size:16px}
/* Glow Lab animations */
@keyframes jcPop{0%{transform:scale(1)}40%{transform:scale(1.35)}100%{transform:scale(0);opacity:0}}
@keyframes jcFall{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes jcShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.lab-cell{display:flex;align-items:center;justify-content:center;border-radius:10px;border:1.5px solid var(--line);background:var(--surface);cursor:pointer;font-size:min(7vw,26px);transition:background .15s,border-color .15s,transform .1s;user-select:none;-webkit-user-select:none;touch-action:none}
.lab-cell.sel{border-color:var(--accent);background:rgba(84,112,127,.15);transform:scale(1.08)}
.lab-cell.pop{animation:jcPop .3s forwards}
.lab-cell.fall{animation:jcFall .25s ease-out}
.lab-cell.bad-swap{animation:jcShake .25s}
</style>
</head>

const $=s=>document.querySelector(s);
const play=$('#play'),ov=$('#ov'),hud=$('#hud'),menuEl=$('#menu'),menuBtn=$('#menuBtn');

function renderMenu(){menuEl.innerHTML='<h1>Juegos <em>JC</em></h1><p>Juega y suma Glow Points · récords diarios.</p><div class="grid">'+GAMES.map(g=>`<button class="card" onclick="prep('${g.id}')"><div class="ic">${g.ic}</div><div class="t">${g.t}</div><div class="d">${g.d}</div><div class="rec">Récord: ${fmt(bestOf(g.rk))}</div></button>`).join('')+'</div>';}
renderMenu();
function prep(id){const g=GAMES.find(x=>x.id===id);if(!g)return;menuEl.classList.add('hidden');menuBtn.classList.remove('hidden');location.hash=id;
 ov.innerHTML=`<div class="ic">${g.ic}</div><h2>${g.t}</h2><p>${g.inst}</p><button class="btn" id="goB">Jugar</button><button class="btn ghost" onclick="toMenu()">Volver</button>`;
 ov.classList.remove('hidden');$('#goB').onclick=()=>{ov.classList.add('hidden');run(id);};}
function run(id){({trivia:gTrivia,millonario:gMillonario,reflejo:gReflejo,mito:gMito,glowlab:gGlowlab,mina:gMina})[id]&&({trivia:gTrivia,millonario:gMillonario,reflejo:gReflejo,mito:gMito,glowlab:gGlowlab,mina:gMina})[id]();}
function gameOver(g,score,extra){
  const best=saveBest(g.rk,score);const rec=score>=best&&score>0;
  ov.innerHTML=`<h2>${rec?'¡Nuevo récord!':'Fin'}</h2><div class="big">${fmt(score)}</div><p>${extra||''}Récord: ${fmt(best)} pts</p><button class="btn" onclick="prep('${g.id}')">Jugar de nuevo</button><button class="btn ghost" onclick="toMenu()">Otro juego</button>`;
  ov.classList.remove('hidden');
  try{if(window.parent!==window){const MILL_LADDER=[10000,25000,50000,100000,200000,300000,500000,750000,1000000,1500000,2000000,3000000,5000000,7500000,10000000];const lvl=g.id==='millonario'?Math.max(0,MILL_LADDER.indexOf(score)+1):0;const pts=g.id==='millonario'?Math.max(8,(lvl||1)*7):Math.min(90,Math.max(8,Math.round(score/25)));window.parent.postMessage({type:'jcm_glow',pts,game:g.id},'*');}}catch(e){}
}
const G=id=>GAMES.find(x=>x.id===id);

// ─── BANCO DE PREGUNTAS (pool de 50) ───
const QBANK=[
 // d:1 FÁCILES (17)

 {d:1,q:'El ácido hialurónico como relleno sirve para…',o:['Aportar volumen e hidratar','Relajar el músculo','Broncear la piel','Bajar de peso'],a:0},

 {d:1,q:'¿El Botox elimina manchas de la piel?',o:['No, solo trata arrugas de expresión','Sí, con varias sesiones','Solo manchas de sol','Sí, en cualquier zona'],a:0},

 // d:2 MEDIAS (17)
 {d:2,q:'¿Cuántas sesiones suele requerir Sculptra según la flacidez?',o:['Entre 1 y 3','Siempre 10','Ninguna','20 o más'],a:0},

 {d:2,q:'¿El ácido hialurónico es compatible con el Botox?',o:['Sí, son tratamientos complementarios','No, son incompatibles','Solo en personas jóvenes','Solo en mujeres'],a:0},
 {d:2,q:'El lifting de ceja con Botox consiste en…',o:['Levantar la ceja con toxina botulínica','Una cirugía ambulatoria','Aplicar ácido hialurónico','Un láser específico'],a:0},

 {d:3,q:'El relleno del arco mandibular define…',o:['El borde de la mandíbula para un rostro más estructurado','El mentón exclusivamente','Los pómulos','El tercio superior del rostro'],a:0},

 {d:3,q:'¿Cuánto dura Sculptra de manera aproximada?',o:['Alrededor de 24 meses','6 meses','5 años','Solo 2 semanas'],a:0},
 {d:3,q:'¿Qué es el surco nasogeniano?',o:['Pliegue entre nariz y comisura labial','La arrugas de la frente','El pliegue del cuello','El borde del párpado'],a:0},
 {d:3,q:'¿La hiperhidrosis axilar se puede tratar con Botox?',o:['Sí, con excelentes resultados','No, solo con cirugía','Solo con antitranspirantes','Solo con láser'],a:0},
 {d:3,q:'¿Cuánto dura aprox. el tratamiento de hiperhidrosis con toxina?',o:['3 a 6 meses','1 semana','2 años fijos','Es permanente'],a:0}
];
// Rotación diaria aleatoria (reproducible por día)
function dayIndex(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
function seededRand(seed){let s=seed^0xDEADBEEF;return()=>{s=Math.imul(s^s>>>16,0x45D9F3B);s=Math.imul(s^s>>>16,0x45D9F3B);return((s^s>>>16)>>>0)/0x100000000;};}
function pick(diff,n,used){
  const rng=seededRand(dayIndex()*diff+diff*13+used.size*7);
  const pool=QBANK.filter(q=>q.d===diff&&!used.has(q)).sort(()=>rng()-.5);
  const out=[];let pi=0;while(out.length<n&&pi<pool.length){out.push(pool[pi]);used.add(pool[pi]);pi++;}
  if(out.length<n){const rest=QBANK.filter(q=>!used.has(q)).sort(()=>rng()-.5);let ri=0;while(out.length<n&&ri<rest.length){out.push(rest[ri]);used.add(rest[ri]);ri++;}}
  return out;}

// ─── 1 · CONSULTORIO TRIVIA (3 rondas × 3 preguntas, 3 vidas) ───
function gTrivia(){const g=G('trivia');let round=1,score=0,lives=3,used=new Set(),qs=[],qi=0,tLeft=0,tMax=0,tick;
 function liv(){return '❤️'.repeat(lives)+'🖤'.repeat(3-lives);}
 function loadRound(){const diff=round===1?1:round===2?2:3;qs=pick(diff,3,used);qi=0;showQ();}
 function showQ(){clearTimers();tMax=Math.max(8,14-round*2);tLeft=tMax;
  const q=qs[qi];
  play.classList.remove('hidden');
  play.innerHTML=`<div style="padding:14px 16px;display:flex;flex-direction:column;height:100%;gap:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)">Ronda ${round}/3 · ${qi+1}/3</div>
      <span class="lives" id="lv">${liv()}</span>
    </div>
    <div class="bar" style="margin:7px 0 12px"><i id="tb" style="width:100%"></i></div>
    <div class="q" style="font-size:18px">${q.q}</div>
    <div id="opts" style="margin-top:4px;flex:1;display:flex;flex-direction:column;justify-content:flex-start"></div></div>`;
  const opts=$('#opts');const order=q.o.map((t,i)=>[t,i]).sort(()=>Math.random()-.5);
  order.forEach(([t,i])=>{const b=document.createElement('button');b.className='opt';b.textContent=t;b.onclick=()=>answer(i,b,opts);opts.appendChild(b);});
  setHud(`<div class="s">Pts<b>${fmt(score)}</b></div>`);
  const t0=Date.now();tick=setInterval(()=>{tLeft=tMax-(Date.now()-t0)/1000;const tb=$('#tb');if(tb)tb.style.width=Math.max(0,tLeft/tMax*100)+'%';if(tLeft<=0){clearInterval(tick);answer(-1,null,opts);}},80);timers.push(tick);}
 function answer(i,btn,opts){clearTimers();const q=qs[qi];
  [...opts.children].forEach((b,bi)=>{b.onclick=null;if(b.textContent===q.o[q.a])b.classList.add('ok');});
  if(i>=0&&q.o[i]===q.o[q.a]){const bonus=Math.round(Math.max(0,tLeft)*5);score+=25+bonus;}
  else{if(btn)btn.classList.add('no');lives--;const lv=$('#lv');if(lv)lv.textContent=liv();}
  setHud(`<div class="s">Pts<b>${fmt(score)}</b></div>`);
  timers.push(setTimeout(()=>{
    if(lives<=0){return gameOver(g,score,'Te quedaste sin vidas. ');}
    qi++;if(qi<qs.length)showQ();else{round++;if(round<=3)loadRound();else gameOver(g,score,'¡Completaste las 3 rondas! ');}
  },900));}
 loadRound();ov._clean=()=>clearTimers();
}

// ─── 2 · MILLONARIO ESTÉTICA (15 preguntas de pool de 50) ───
function gMillonario(){const g=G('millonario');
 const LADDER=[10000,25000,50000,100000,200000,300000,500000,750000,1000000,1500000,2000000,3000000,5000000,7500000,10000000];
 const SAFE=[50000,300000,1000000,3000000];
 const rng=seededRand(dayIndex()*31+17);
 // Selección de 15 preguntas del pool (5 easy, 5 med, 5 hard) con seed diario
 const pool15=[];const usedD={};['1','2','3'].forEach(d=>{const qs=QBANK.filter(q=>q.d===+d).sort(()=>rng()-.5);pool15.push(...qs.slice(0,5));});
 pool15.sort(()=>rng()-.5);// mezclar los 15
 let qi=0,fifty=true;
 function showQ(){clearTimers();if(qi>=pool15.length)return win();
  const q=pool15[qi];
  play.classList.remove('hidden');
  const order=q.o.map((t,i)=>[t,i]).sort(()=>Math.random()-.5);
  play.innerHTML=`<div style="padding:14px 16px;display:flex;flex-direction:column;height:100%">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)">Pregunta ${qi+1}/15 · $${fmt(LADDER[qi])}</div>
      <button id="ff" style="font-family:Jost;font-size:11px;font-weight:600;border:1px solid var(--line);background:${fifty?'var(--surface)':'#eee'};border-radius:999px;padding:5px 11px;cursor:pointer;color:${fifty?'var(--accent)':'#bbb'}">${fifty?'50:50':'—'}</button>
    </div>
    <div class="q" style="margin-top:12px;font-size:17px">${q.q}</div>
    <div id="opts" style="margin-top:4px;flex:1;display:flex;flex-direction:column;justify-content:flex-start"></div>
    <div style="margin-top:4px;font-size:11px;color:var(--mute);text-align:center;flex-shrink:0">Asegurado: $${fmt(safeAmt())}</div></div>`;
  const opts=$('#opts');const btns=[];
  order.forEach(([t,i])=>{const b=document.createElement('button');b.className='opt';b.textContent=t;b._i=i;b.onclick=()=>answer(i,b,opts,q);opts.appendChild(b);btns.push(b);});
  $('#ff').onclick=()=>{if(!fifty)return;fifty=false;$('#ff').style.opacity=.4;const wrong=btns.filter(b=>b._i!==q.a);wrong.sort(()=>Math.random()-.5).slice(0,2).forEach(b=>{b.style.visibility='hidden';b.onclick=null;});};
  setHud(`<div class="s">Nivel<b>${qi+1}/15</b></div>`);}
 function safeAmt(){let s=0;SAFE.forEach(v=>{const idx=LADDER.indexOf(v);if(qi>idx)s=v;});return s;}
 function answer(i,btn,opts,q){[...opts.children].forEach(b=>{b.onclick=null;if(b._i===q.a)b.classList.add('ok');});
  if(i===q.a){qi++;timers.push(setTimeout(()=>{if(qi>=LADDER.length)win();else showQ();},850));}
  else{btn.classList.add('no');timers.push(setTimeout(()=>gameOver(g,safeAmt(),'Te llevas el premio asegurado. '),850));}}
 function win(){gameOver(g,LADDER[LADDER.length-1],'¡Ganaste el premio mayor! ');}
 showQ();ov._clean=()=>clearTimers();
}

// ─── 3 · MITO O VERDAD (10 afirmaciones · 3 vidas) ───
const MV=[
 ['El Botox congela permanentemente la cara.',false],
 ['El ácido hialurónico se puede disolver si no te gusta.',true],
 ['La rinomodelación con ácido hialurónico no requiere cirugía.',true],
 ['Sculptra estimula tu propio colágeno.',true],
 ['El Botox da resultado al instante el mismo día.',false],
 ['Una evaluación previa es necesaria antes de cualquier procedimiento.',true],
 ['El Botox bien aplicado mantiene tu expresión natural.',true],
 ['Los rellenos de ácido hialurónico duran para siempre.',false],
 ['El NCTF mejora luminosidad e hidratación de la piel.',true],
 ['Más producto siempre es mejor en armonización facial.',false],
 ['Sculptra es un bioestimulador de colágeno, no un relleno.',true],
 ['El bruxismo puede tratarse con toxina botulínica.',true],
 ['La rinomodelación puede sustituir a la rinoplastia en todos los casos.',false],
 ['La hialuronidasa puede disolver el ácido hialurónico.',true],
 ['Juvéderm es una marca premium de ácido hialurónico.',true]
];
function gMito(){const g=G('mito');let i=0,score=0,lives=3;
 const rng=seededRand(dayIndex()+19);
 const list=MV.slice().sort(()=>rng()-.5).slice(0,10);
 function liv(){return '❤️'.repeat(lives)+'🖤'.repeat(3-lives);}
 function show(){if(i>=list.length)return gameOver(g,score,'¡Completaste las 10! ');
  const[txt,truth]=list[i];
  play.classList.remove('hidden');
  play.innerHTML=`<div style="padding:16px;display:flex;flex-direction:column;height:100%;justify-content:center;gap:16px;text-align:center">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)">${i+1}/10</div>
      <span class="lives">${liv()}</span>
    </div>
    <div class="q" style="font-size:20px;text-align:center">${txt}</div>
    <div style="display:flex;gap:10px;margin-top:4px"><button id="v" style="flex:1;padding:16px 0;border:none;border-radius:14px;background:var(--good);color:#fff;font-family:Jost;font-weight:600;font-size:15px;cursor:pointer">✓ VERDAD</button><button id="m" style="flex:1;padding:16px 0;border:none;border-radius:14px;background:var(--bad);color:#fff;font-family:Jost;font-weight:600;font-size:15px;cursor:pointer">✗ MITO</button></div>
    <div id="fb" style="min-height:18px;font-size:13px;color:var(--mute)"></div></div>`;
  setHud(`<div class="s">Pts<b>${fmt(score)}</b></div>`);
  function ans(val){$('#v').onclick=$('#m').onclick=null;const ok=val===truth;if(ok)score+=20;else{lives--;if(lives<=0){$('#fb').textContent='Era '+(truth?'VERDAD':'MITO')+' · sin vidas';$('#fb').style.color='var(--bad)';timers.push(setTimeout(()=>gameOver(g,score,'Te quedaste sin vidas. '),900));return;}}
   $('#fb').textContent=ok?'¡Correcto!':'Era '+(truth?'VERDAD':'MITO');$('#fb').style.color=ok?'var(--good)':'var(--bad)';setHud(`<div class="s">Pts<b>${fmt(score)}</b></div>`);timers.push(setTimeout(()=>{i++;show();},800));}
  $('#v').onclick=()=>ans(true);$('#m').onclick=()=>ans(false);}
 show();ov._clean=()=>clearTimers();
}

// ─── 4 · REFLEJO GLOW (< 400 ms para puntuar) ───
function gReflejo(){const g=G('reflejo');let round=0,hitCount=0,totalMs=0,to;
 play.classList.remove('hidden');
 function next(){round++;if(round>5){const avg=hitCount>0?Math.round(totalMs/hitCount):999;const score=hitCount>0?Math.min(900,hitCount*Math.max(20,Math.round(180-(avg-100)*0.5))):0;return gameOver(g,score,hitCount+'/5 reacciones bajo 400ms. Promedio: '+(hitCount?avg:'—')+' ms. ');}
  setHud(`<div class="s">Ronda<b>${round}/5</b></div>`);
  render('#e7e0d2','Espera…',false,false);
  const delay=700+Math.floor(Math.random()*1800);
  to=setTimeout(()=>{const t0=Date.now();let reacted=false;
   render('#cfe3d8','¡TOCA!',true,false);
   const timeout=setTimeout(()=>{if(!reacted){render('#f3dcd5','Muy lento',false,true);timers.push(setTimeout(next,900));}},1800);timers.push(timeout);
   $('#pad').onclick=()=>{if(reacted)return;reacted=true;clearTimeout(timeout);const ms=Date.now()-t0;
    if(ms<400){hitCount++;totalMs+=ms;render('#dcefe4',ms+' ms ✓',false,false,'var(--good)');timers.push(setTimeout(next,750));}
    else{render('#f3dcd5',ms+' ms — muy lento',false,false,'var(--bad)');timers.push(setTimeout(next,900));}};
  },delay);timers.push(to);}
 function render(bg,txt,go,early,col){const c=col||(go?'var(--good)':early?'var(--bad)':'var(--ink)');play.innerHTML=`<button id="pad" style="position:absolute;inset:0;border:none;background:${bg};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:background .12s"><div style="font-family:Marcellus;font-size:${go?'40px':'28px'};color:${c}">${txt}</div><div style="font-size:12px;color:var(--mute)">${go?'¡Reacciona ya!':early?'demasiado tarde/pronto':'espera el verde…'}</div></button>`;}
 next();ov._clean=()=>clearTimers();
}

// ─── 5 · GLOW LAB (arrastra · candy crush · animaciones) ───
function gGlowlab(){const g=G('glowlab');
 const COLS=5,ROWS=7;
 const EMO=['💧','💉','🧴','✨','🧪'];
 const COLORS=['#dbeaf5','#f5dbe5','#e5f5db','#f5f0db','#e8dbf5'];
 let grid=[],score=0,moves=25,combo=0;
 let dragSrc=null;
 play.classList.remove('hidden');
 const rnd=()=>Math.floor(Math.random()*EMO.length);

 function init(){grid=[];for(let r=0;r<ROWS;r++){grid.push([]);for(let c=0;c<COLS;c++)grid[r].push(rnd());}
  // remove initial matches
  let lim=0;while(findMatches().size&&lim++<80){findMatches().forEach(k=>{const[r,c]=k.split(',').map(Number);grid[r][c]=rnd();});}}

 function findMatches(){const m=new Set();
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-2;c++){const v=grid[r][c];if(v!=null&&v===grid[r][c+1]&&v===grid[r][c+2]){m.add(r+','+c);m.add(r+','+(c+1));m.add(r+','+(c+2));}}
  for(let c=0;c<COLS;c++)for(let r=0;r<ROWS-2;r++){const v=grid[r][c];if(v!=null&&v===grid[r+1][c]&&v===grid[r+2][c]){m.add(r+','+c);m.add((r+1)+','+c);m.add((r+2)+','+c);}}
  return m;}

 function swap(a,b){const t=grid[a[0]][a[1]];grid[a[0]][a[1]]=grid[b[0]][b[1]];grid[b[0]][b[1]]=t;}

 function settle(){
  const m=findMatches();if(!m.size){combo=0;render();return;}
  combo++;score+=m.size*(10+combo*2);
  // mark cells for pop animation then remove
  const cells=play.querySelectorAll('[data-r]');
  m.forEach(k=>{const[r,c]=k.split(',').map(Number);const el=play.querySelector(`[data-r="${r}"][data-c="${c}"]`);if(el){el.classList.add('pop');}});
  setHud(`<div class="s">Pts<b>${fmt(score)}</b></div><div class="s">Mov<b>${moves}</b></div>`);
  setTimeout(()=>{
   m.forEach(k=>{const[r,c]=k.split(',').map(Number);grid[r][c]=null;});
   // collapse columns
   for(let c=0;c<COLS;c++){const col=[];for(let r=ROWS-1;r>=0;r--)if(grid[r][c]!=null)col.push(grid[r][c]);while(col.length<ROWS)col.push(rnd());for(let r=ROWS-1,i=0;r>=0;r--,i++)grid[r][c]=col[i];}
   setTimeout(()=>settle(),280);
  },320);}

 function trySwap(src,dst){
  swap(src,dst);
  if(findMatches().size){moves--;render();setTimeout(()=>settle(),80);}
  else{swap(src,dst);// shake animation
   render();const srcEl=play.querySelector(`[data-r="${src[0]}"][data-c="${src[1]}"]`);if(srcEl){srcEl.classList.remove('bad-swap');void srcEl.offsetWidth;srcEl.classList.add('bad-swap');}}
  if(moves<=0){setTimeout(()=>gameOver(g,score),800);}}

 function render(){
  const cSize=Math.floor(Math.min((play.clientWidth-24)/COLS,(play.clientHeight-60)/ROWS));
  setHud(`<div class="s">Pts<b>${fmt(score)}</b></div><div class="s">Mov<b>${moves}</b></div>`);
  let h=`<div style="padding:8px 12px;display:flex;flex-direction:column;height:100%;align-items:center;gap:8px"><div style="display:grid;grid-template-columns:repeat(${COLS},${cSize}px);grid-template-rows:repeat(${ROWS},${cSize}px);gap:4px;flex-shrink:0">`;
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const v=grid[r][c];h+=`<div class="lab-cell fall" data-r="${r}" data-c="${c}" style="width:${cSize}px;height:${cSize}px;background:${v!=null?COLORS[v]:'rgba(20,20,15,.08)'};font-size:${Math.round(cSize*.45)}px">${v!=null?EMO[v]:''}</div>`;}
  h+='</div></div>';play.innerHTML=h;
  // Drag events
  let ds=null,sx=0,sy=0;
  play.addEventListener('touchstart',e=>{const el=e.target.closest('[data-r]');if(!el)return;e.preventDefault();ds=[+el.dataset.r,+el.dataset.c];sx=e.touches[0].clientX;sy=e.touches[0].clientY;el.classList.add('sel');},{passive:false});
  play.addEventListener('touchend',e=>{if(!ds)return;e.preventDefault();const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;const th=cSize*0.35;let dr=0,dc=0;if(Math.abs(dx)>Math.abs(dy)){dc=dx>th?1:dx<-th?-1:0;}else{dr=dy>th?1:dy<-th?-1:0;}if(dr||dc){const nr=ds[0]+dr,nc=ds[1]+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)trySwap(ds,[nr,nc]);}else render();ds=null;},{passive:false});
 }
 init();render();ov._clean=()=>clearTimers();
}

// ─── 6 · MAPA DE PUNCIÓN ───
function gMina(){const g=G('mina');const R=8,C=6,NERV=9;let grid,rev,flag,over,won,started,flagMode=false,revealed=0;
 play.classList.remove('hidden');
 const NUMCOL=['','#4E8A72','#54707F','#caa86a','#9C8AB5','#c0563f','#c0563f','#c0563f','#c0563f'];
 const SAFE=R*C-NERV;
 function reset(){grid=[];rev=[];flag=[];over=false;won=false;started=false;revealed=0;
  for(let r=0;r<R;r++){grid.push(Array(C).fill(0));rev.push(Array(C).fill(false));flag.push(Array(C).fill(false));}}
 function place(sr,sc){let n=0;while(n<NERV){const r=Math.floor(Math.random()*R),c=Math.floor(Math.random()*C);
   if(grid[r][c]===-1||(Math.abs(r-sr)<=1&&Math.abs(c-sc)<=1))continue;grid[r][c]=-1;n++;}
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){if(grid[r][c]===-1)continue;let k=0;for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<R&&nc>=0&&nc<C&&grid[nr][nc]===-1)k++;}grid[r][c]=k;}}
 function flood(r,c){if(r<0||r>=R||c<0||c>=C||rev[r][c]||flag[r][c])return;rev[r][c]=true;revealed++;if(grid[r][c]===0)for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++)flood(r+dr,c+dc);}
 function revealNerves(){for(let r=0;r<R;r++)for(let c=0;c<C;c++)if(grid[r][c]===-1&&rev[r][c]!=='boom')rev[r][c]='nerve';}
 function tap(r,c){if(over||won)return;
  if(flagMode){if(rev[r][c]===true)return;flag[r][c]=!flag[r][c];return render();}
  if(flag[r][c])return;
  if(!started){place(r,c);started=true;}
  if(grid[r][c]===-1){over=true;rev[r][c]='boom';revealNerves();render();return gameOver(g,revealed*10,'Tocaste un nervio. ');}
  flood(r,c);
  if(revealed===SAFE){won=true;render();return gameOver(g,revealed*10+200,'¡Mapa despejado! ');}
  render();}
 function render(){const left=NERV-flag.flat().filter(Boolean).length;
  setHud(`<div class="s">Nervios<b>${left}</b></div>`);
  const cSize=Math.floor(Math.min((play.clientWidth-24)/C,(play.clientHeight-70)/R));
  let h=`<div style="padding:8px 10px;display:flex;flex-direction:column;align-items:center;height:100%;gap:8px">`;
  h+=`<button id="fm" style="align-self:center;font-family:Jost;font-size:12px;font-weight:600;border:1px solid var(--line);background:${flagMode?'var(--accent)':'var(--surface)'};color:${flagMode?'#fff':'var(--accent)'};border-radius:999px;padding:7px 16px;cursor:pointer;flex-shrink:0">${flagMode?'🚩 Marcar nervio':'💉 Puncionar'}</button>`;
  h+=`<div style="display:grid;grid-template-columns:repeat(${C},${cSize}px);grid-template-rows:repeat(${R},${cSize}px);gap:3px;flex-shrink:0">`;
  for(let r=0;r<R;r++)for(let c=0;c<C;c++){let bg='var(--surface)',bd='var(--line)',ct='';
   if(flag[r][c]&&rev[r][c]!==true){ct='🚩';bg='#fbf3e6';bd='var(--warn)';}
   else if(rev[r][c]==='boom'){bg='#f3dcd5';bd='var(--bad)';ct='⚡';}
   else if(rev[r][c]==='nerve'){bg='#efe7df';ct='⚡';}
   else if(rev[r][c]===true){bg='#e9f1ec';bd='rgba(78,138,114,.35)';if(grid[r][c]>0)ct='<b style="color:'+NUMCOL[grid[r][c]]+'">'+grid[r][c]+'</b>';}
   h+=`<button data-r="${r}" data-c="${c}" style="width:${cSize}px;height:${cSize}px;border:1px solid ${bd};background:${bg};border-radius:7px;font-size:${Math.round(cSize*.45)}px;display:flex;align-items:center;justify-content:center;cursor:pointer">${ct}</button>`;}
  h+='</div></div>';play.innerHTML=h;
  $('#fm').onclick=()=>{flagMode=!flagMode;render();};
  play.querySelectorAll('button[data-r]').forEach(b=>b.onclick=()=>tap(+b.dataset.r,+b.dataset.c));}
 reset();render();ov._clean=()=>clearTimers();
}

if(startId&&G(startId)){let embedded=false;try{embedded=window.self!==window.top;}catch(e){embedded=true;}if(embedded){menuEl.classList.add('hidden');menuBtn.classList.remove('hidden');run(startId);}else prep(startId);}
