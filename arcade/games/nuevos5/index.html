<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>JC Medical · Juegos (tanda 5)</title>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F2EC;--surface:#fff;--ink:#1A1A14;--mute:#5C5A50;--line:rgba(20,20,15,.12);--accent:#54707F;--silver:#8A929B;--good:#4E8A72;--bad:#c0563f;--warn:#caa86a;--vio:#9C8AB5}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}html{background:#DCD7CC}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);overflow:hidden;display:flex;flex-direction:column;height:100dvh;max-width:440px;margin:0 auto;box-shadow:0 24px 70px -28px rgba(0,0,0,.55)}
.top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0}
.top .nm{font-family:'Marcellus';font-size:16px}.top .nm span{color:var(--accent)}
.top button{font-family:'Jost';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute);background:none;border:none;cursor:pointer}
.hud{display:flex;gap:16px;align-items:center}.hud .s{font-size:11px;color:var(--mute)}.hud .s b{font-family:'Marcellus';font-size:17px;color:var(--ink);display:block;line-height:1}
.stage{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}
.menu{position:absolute;inset:0;overflow-y:auto;padding:20px 16px 28px}
.menu h1{font-family:'Marcellus';font-weight:400;font-size:27px}.menu h1 em{font-style:italic;color:var(--accent)}
.menu p{color:var(--mute);font-size:12.5px;font-weight:300;margin-top:6px;line-height:1.5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:16px}
.card{text-align:left;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:14px;cursor:pointer;transition:transform .25s,box-shadow .25s;display:flex;flex-direction:column;gap:5px}
.card:active{transform:scale(.97)}.card:hover{transform:translateY(-3px);box-shadow:0 16px 32px -22px rgba(40,38,30,.5)}
.card .ic{font-size:24px}.card .t{font-family:'Marcellus';font-size:16px;line-height:1.1}.card .d{font-size:11px;color:var(--mute);font-weight:300;line-height:1.4}
.card .rec{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-top:2px}
.ov{position:absolute;inset:0;background:rgba(245,242,236,.94);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:5}
.ov h2{font-family:'Marcellus';font-size:28px;font-weight:400}.ov p{color:var(--mute);font-size:13px;font-weight:300;margin-top:8px;line-height:1.55}
.ov .big{font-family:'Marcellus';font-size:50px;color:var(--accent);line-height:1;margin:10px 0}
.btn{margin-top:16px;font-family:'Jost';font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;background:var(--ink);color:var(--bg);border:none;border-radius:999px;padding:13px 24px;cursor:pointer}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line);margin-top:9px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="top"><div class="nm">JC <span>Medical</span> · Juegos</div><div class="hud" id="hud"></div><button id="menuBtn" class="hidden" onclick="toMenu()">☰ Menú</button></div>
<div class="stage"><canvas id="cv" class="hidden"></canvas><div class="menu" id="menu"></div><div class="ov hidden" id="ov"></div></div>
<script>
const REC_KEY='jcm_records';
function getRecs(){try{return JSON.parse(localStorage.getItem(REC_KEY)||'{}')}catch(e){return{}}}
function bestOf(rk){return getRecs()[rk]||0;}
function saveBest(rk,s){const r=getRecs();if(s>(r[rk]||0)){r[rk]=s;try{localStorage.setItem(REC_KEY,JSON.stringify(r))}catch(e){}}return r[rk]||0;}
function fmt(n){return (n||0).toLocaleString('es-CL');}
const $=s=>document.querySelector(s);
const cv=$('#cv'),ov=$('#ov'),hud=$('#hud'),menuEl=$('#menu'),menuBtn=$('#menuBtn');
let ctx=cv.getContext('2d'),W=0,H=0,raf=0;
function resize(){const r=cv.getBoundingClientRect(),d=window.devicePixelRatio||1;cv.width=r.width*d;cv.height=r.height*d;ctx.setTransform(d,0,0,d,0,0);W=r.width;H=r.height;}
window.addEventListener('resize',()=>{if(!cv.classList.contains('hidden'))resize();});
function setHud(h){hud.innerHTML=h;}function showOverlay(h){ov.innerHTML=h;ov.classList.remove('hidden');}function hideOverlay(){ov.classList.add('hidden');}
function stopRAF(){if(raf)cancelAnimationFrame(raf);raf=0;}
function toMenu(){stopRAF();cv.classList.add('hidden');hideOverlay();cv.onpointerdown=cv.onpointermove=cv.onpointerup=cv.ontouchstart=cv.ontouchmove=null;menuEl.classList.remove('hidden');menuBtn.classList.add('hidden');setHud('');location.hash='';}
function pxy(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
const GAMES=[
 {id:'breakout',rk:'acc_breakout',ic:'🧱',t:'Rompe Poros',d:'Rebota y rompe los bloques.'},
 {id:'pong',  rk:'acc_pong',  ic:'🏓',t:'Rebote',d:'No dejes pasar la pelota.'},
 {id:'dodge', rk:'acc_dodge', ic:'🛡️',t:'Esquiva',d:'Esquiva lo que cae. Aguanta.'},
 {id:'salta', rk:'acc_salta', ic:'🦘',t:'Salta el Bisturí',d:'Salta los obstáculos. Toca para saltar.'},
 {id:'globos',rk:'acc_globos',ic:'🎈',t:'Globos Glow',d:'Revienta los globos, evita los pinchos.'}
];
function renderMenu(){menuEl.innerHTML='<h1>Juegos <em>nuevos · tanda 5</em></h1><p>Arcade clásico en móvil. Cada uno guarda tu récord.</p><div class="grid">'+GAMES.map(g=>`<button class="card" onclick="start('${g.id}')"><div class="ic">${g.ic}</div><div class="t">${g.t}</div><div class="d">${g.d}</div><div class="rec">Récord: ${fmt(bestOf(g.rk))}</div></button>`).join('')+'</div>';}
renderMenu();
function start(id){const g=GAMES.find(x=>x.id===id);if(!g)return;menuEl.classList.add('hidden');menuBtn.classList.remove('hidden');hideOverlay();location.hash=id;
 ({breakout:gBreak,pong:gPong,dodge:gDodge,salta:gSalta,globos:gGlobos})[id](g);}
function gameOver(g,score){stopRAF();const best=saveBest(g.rk,score);const rec=score>=best&&score>0;showOverlay(`<h2>${rec?'¡Nuevo récord!':'Fin'}</h2><div class="big">${fmt(score)}</div><p>Récord: ${fmt(best)} puntos</p><button class="btn" onclick="start('${g.id}')">Jugar de nuevo</button><button class="btn ghost" onclick="toMenu()">Otro juego</button>`);}

// 1 · BREAKOUT
function gBreak(g){cv.classList.remove('hidden');resize();
 let pad={x:W/2,w:78},ball={x:W/2,y:H-70,vx:3.4,vy:-3.4,r:7},bricks=[],score=0,lives=3,over=false;
 function build(){bricks=[];const cols=6,bw=(W-24)/cols,bh=20;for(let r=0;r<5;r++)for(let c=0;c<cols;c++)bricks.push({x:12+c*bw,y:60+r*(bh+6),w:bw-5,h:bh,c:['#54707F','#4E8A72','#caa86a','#9C8AB5','#5E7A99'][r]});}
 build();
 function hud2(){setHud(`<div class="s">Puntos<b>${fmt(score)}</b></div><div class="s">Vidas<b>${'♥'.repeat(lives)||'—'}</b></div>`);}hud2();
 cv.onpointermove=e=>{pad.x=Math.max(pad.w/2,Math.min(W-pad.w/2,pxy(e).x));};cv.onpointerdown=cv.onpointermove;
 function loop(){ctx.clearRect(0,0,W,H);
  ball.x+=ball.vx;ball.y+=ball.vy;
  if(ball.x<ball.r||ball.x>W-ball.r)ball.vx*=-1;if(ball.y<ball.r)ball.vy*=-1;
  if(ball.y>H-44&&ball.y<H-30&&Math.abs(ball.x-pad.x)<pad.w/2+ball.r&&ball.vy>0){ball.vy=-Math.abs(ball.vy);ball.vx=(ball.x-pad.x)/(pad.w/2)*4.2;}
  bricks.forEach(b=>{if(b.dead)return;if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y>b.y&&ball.y<b.y+b.h){b.dead=true;ball.vy*=-1;score+=10;hud2();}});
  if(bricks.every(b=>b.dead)){build();ball.vx*=1.08;ball.vy=-Math.abs(ball.vy)*1.08;ball.x=W/2;ball.y=H-70;}
  if(ball.y>H+12){lives--;hud2();if(lives<=0){over=true;return gameOver(g,score);}ball.x=W/2;ball.y=H-70;ball.vy=-Math.abs(ball.vy);ball.vx=3.2;}
  bricks.forEach(b=>{if(b.dead)return;ctx.fillStyle=b.c;ctx.fillRect(b.x,b.y,b.w,b.h);});
  ctx.fillStyle='#1A1A14';ctx.beginPath();ctx.roundRect(pad.x-pad.w/2,H-40,pad.w,12,6);ctx.fill();
  ctx.fillStyle='#54707F';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fill();
  if(!over)raf=requestAnimationFrame(loop);}
 raf=requestAnimationFrame(loop);
}
// 2 · PONG
function gPong(g){cv.classList.remove('hidden');resize();
 let me={x:W/2,w:80},ai={x:W/2,w:80},ball={x:W/2,y:H/2,vx:3,vy:4,r:7},score=0,over=false;
 function hud2(){setHud(`<div class="s">Rallies<b>${score}</b></div>`);}hud2();
 cv.onpointermove=e=>{me.x=Math.max(me.w/2,Math.min(W-me.w/2,pxy(e).x));};cv.onpointerdown=cv.onpointermove;
 function loop(){ctx.clearRect(0,0,W,H);
  ball.x+=ball.vx;ball.y+=ball.vy;ai.x+=Math.max(-4,Math.min(4,(ball.x-ai.x)*0.12));
  if(ball.x<ball.r||ball.x>W-ball.r)ball.vx*=-1;
  if(ball.y<30&&Math.abs(ball.x-ai.x)<ai.w/2+ball.r&&ball.vy<0){ball.vy=Math.abs(ball.vy);ball.vx+=(ball.x-ai.x)/ai.w*2;}
  if(ball.y>H-30&&Math.abs(ball.x-me.x)<me.w/2+ball.r&&ball.vy>0){ball.vy=-Math.abs(ball.vy)*1.04;ball.vx+=(ball.x-me.x)/me.w*3;score++;hud2();}
  if(ball.y<-12){ball.x=W/2;ball.y=H/2;ball.vy=4;ball.vx=3;} // AI falló (raro): reinicia
  if(ball.y>H+12){over=true;return gameOver(g,score);}
  ctx.fillStyle='#9C8AB5';ctx.beginPath();ctx.roundRect(ai.x-ai.w/2,18,ai.w,11,6);ctx.fill();
  ctx.fillStyle='#1A1A14';ctx.beginPath();ctx.roundRect(me.x-me.w/2,H-30,me.w,11,6);ctx.fill();
  ctx.fillStyle='#54707F';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fill();
  if(!over)raf=requestAnimationFrame(loop);}
 raf=requestAnimationFrame(loop);
}
// 3 · DODGE
function gDodge(g){cv.classList.remove('hidden');resize();
 let me={x:W/2,w:42},objs=[],t=0,spawn=0,over=false,last=performance.now();
 function hud2(){setHud(`<div class="s">Tiempo<b>${Math.floor(t)}s</b></div>`);}hud2();
 cv.onpointermove=e=>{me.x=Math.max(me.w/2,Math.min(W-me.w/2,pxy(e).x));};cv.onpointerdown=cv.onpointermove;
 function loop(now){const dt=Math.min(40,now-last);last=now;t+=dt/1000;ctx.clearRect(0,0,W,H);
  spawn-=dt;if(spawn<=0){objs.push({x:20+Math.random()*(W-40),y:-20,w:18+Math.random()*16,vy:2.6+t*0.12});spawn=Math.max(220,560-t*10);}
  objs.forEach(o=>o.y+=o.vy);objs=objs.filter(o=>o.y<H+30);
  const my=H-34;
  for(const o of objs){if(o.y>my-14&&o.y<my+14&&Math.abs(o.x-me.x)<me.w/2+o.w/2){over=true;return gameOver(g,Math.floor(t*10));}}
  ctx.fillStyle='#c0563f';objs.forEach(o=>{ctx.beginPath();ctx.roundRect(o.x-o.w/2,o.y-o.w/2,o.w,o.w,4);ctx.fill();});
  ctx.fillStyle='#54707F';ctx.beginPath();ctx.roundRect(me.x-me.w/2,my-8,me.w,16,8);ctx.fill();
  hud2();if(!over)raf=requestAnimationFrame(loop);}
 raf=requestAnimationFrame(loop);
}
// 4 · SALTA (dino runner)
function gSalta(g){cv.classList.remove('hidden');resize();
 const groundY=()=>H-50;let py=0,vy=0,onG=true,obs=[],t=0,spawn=0,over=false,last=performance.now(),score=0;
 function jump(){if(onG){vy=-11.5;onG=false;}}
 cv.onpointerdown=jump;
 function hud2(){setHud(`<div class="s">Puntos<b>${fmt(score)}</b></div>`);}hud2();
 function loop(now){const dt=Math.min(40,now-last);last=now;t+=dt;ctx.clearRect(0,0,W,H);
  vy+=0.6;py+=vy;if(py>0){py=0;vy=0;onG=true;}
  spawn-=dt;if(spawn<=0){obs.push({x:W+20,w:16+Math.random()*14,h:24+Math.random()*26});spawn=Math.max(700,1300-t*0.04);}
  const sp=4+t*0.0006;obs.forEach(o=>o.x-=sp);
  obs=obs.filter(o=>{if(o.x<-30){score+=10;hud2();return false;}return true;});
  const px=46,pr=16,pyTop=groundY()-pr*2+py;
  for(const o of obs){if(px+pr>o.x&&px-pr<o.x+o.w&&groundY()+py>groundY()-o.h){over=true;return gameOver(g,score);}}
  ctx.strokeStyle='#cdc6b8';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,groundY());ctx.lineTo(W,groundY());ctx.stroke();
  ctx.fillStyle='#c0563f';obs.forEach(o=>ctx.fillRect(o.x,groundY()-o.h,o.w,o.h));
  ctx.fillStyle='#54707F';ctx.beginPath();ctx.roundRect(px-12,groundY()-30+py,24,30,6);ctx.fill();
  if(!over)raf=requestAnimationFrame(loop);}
 raf=requestAnimationFrame(loop);
}
// 5 · GLOBOS
function gGlobos(g){cv.classList.remove('hidden');resize();
 let balls=[],score=0,lives=3,spawn=0,over=false,last=performance.now();
 function hud2(){setHud(`<div class="s">Puntos<b>${fmt(score)}</b></div><div class="s">Vidas<b>${'♥'.repeat(lives)||'—'}</b></div>`);}hud2();
 cv.onpointerdown=e=>{const p=pxy(e);for(let i=balls.length-1;i>=0;i--){const b=balls[i];if(Math.hypot(b.x-p.x,b.y-p.y)<b.r+6){if(b.bomb){lives--;hud2();if(lives<=0){over=true;return gameOver(g,score);}}else{score+=10;}balls.splice(i,1);return;}}};
 function loop(now){const dt=Math.min(40,now-last);last=now;ctx.clearRect(0,0,W,H);
  spawn-=dt;if(spawn<=0){const bomb=Math.random()<0.18;balls.push({x:30+Math.random()*(W-60),y:H+24,vy:-(1.4+Math.random()*1.2+score*0.004),r:20,bomb});spawn=Math.max(420,820-score*2);}
  balls.forEach(b=>b.y+=b.vy);
  balls=balls.filter(b=>{if(b.y<-b.r){if(!b.bomb){lives--;hud2();if(lives<=0){over=true;gameOver(g,score);}}return false;}return true;});
  balls.forEach(b=>{ctx.fillStyle=b.bomb?'#3a3a3a':['#54707F','#4E8A72','#caa86a','#9C8AB5'][Math.floor(b.x)%4];ctx.beginPath();ctx.ellipse(b.x,b.y,b.r*.85,b.r,0,0,7);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.15)';ctx.beginPath();ctx.moveTo(b.x,b.y+b.r);ctx.lineTo(b.x,b.y+b.r+10);ctx.stroke();if(b.bomb){ctx.fillStyle='#fff';ctx.font='bold 13px Jost';ctx.textAlign='center';ctx.fillText('✕',b.x,b.y+4);}});
  if(!over)raf=requestAnimationFrame(loop);}
 raf=requestAnimationFrame(loop);
}
const startId=new URLSearchParams(location.search).get('game')||location.hash.replace('#','');
if(startId&&GAMES.find(g=>g.id===startId))start(startId);
</script>
</body>
</html>
